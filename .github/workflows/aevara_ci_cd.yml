# @module: .github/workflows/aevara_ci_cd.yml
# @summary: GitHub Actions pipeline: lint -> unit -> integration -> property -> security -> build -> artifact -> deploy.

name: AEVRA — Institutional CI/CD Pipeline
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate_quality:
    name: quality gates & invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio hypothesis ruff security-scan-placeholder

      - name: Linting (Ruff Check)
        run: ruff check .

      - name: Security Scan (Secret Masking check)
        run: |
          # Fake scan but fails if "TODO_SECRET" is found in plain text (in production use real tool)
          ! grep -r "T-O-K-E-N" aevara/src/ || exit 1

      - name: Unit Tests
        run: pytest aevara/tests/unit

      - name: Integration & Property Tests (The Fusion Gate)
        run: |
          $env:PYTHONPATH="."
          pytest aevara/tests/integration aevara/tests/property

  deploy:
    name: atomic deployment & probe
    needs: validate_quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Paper Environment
        env:
          AEVRA_ENV: paper
          AEVRA_VAULT_TOKEN: ${{ secrets.AEVRA_VAULT_TOKEN }}
        run: |
          python -m aevara.scripts.deploy_orchestrator --env paper --version ${{ github.sha }}
