# @module: ARCHITECT_PROFILE
# @deps: None
# @status: ACTIVE
# @last_update: 2026-04-06
# @summary: Perfil do Architect - Design de contratos, interfaces e invariantes

role_id: Architect
domain: Contract Design & Invariant Validation
expertise: [schema_design, contract_definition, dependency_graphing, invariant_checking]
input_contract:
  required_files: [docs/PROJECT_STATE.yaml, docs/ARCHITECTURE_MAP.md]
  max_context: 3
  validation: contract_validity
output_contract:
  deliverables: [contract.md, deps_graph.yaml, gate_checklist.md]
  format: markdown + yaml
context_budget: 3
activation_triggers:
  - task.entering_design_phase
  - contract_revision_needed
  - new_module_bootstrap
decay_sensors:
  - context_overuse_2_cycles
  - contract_rejection_rate > 0.2
fallback_chain:
  - Director (if scope ambiguous)
  - Strategist (if alternative architecture needed)
metrics:
  contract_approval_rate: 0.90
  invariant_violation_rate: 0.0
  avg_design_time_ms: 600
version: v1.0
