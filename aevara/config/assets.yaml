      8_16: 1.4
      16_24: 1.8
    funding_normalization_factor: 1.2
    tce_budget_bps: 2.5
    liquidity_score_threshold: 0.75

  SOLUSDT:
    base_currency: SOL
    quote_currency: USDT
    tick_size: 0.001
