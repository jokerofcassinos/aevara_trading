# @summary: Global Asset Registry and Configuration for Multi-Asset Portfolio. BTC, ETH, and SOL defined.

assets:
  BTCUSDT:
    base_currency: BTC
    quote_currency: USDT
    tick_size: 0.01
    lot_size: 1.0
    min_order_size: 0.01
    max_order_size: 10.0
    session_profile:
      0_8: 1.0     # Asia
      8_16: 1.5    # EU
      16_24: 2.0   # US
    funding_normalization_factor: 1.0
    tce_budget_bps: 2.0
    liquidity_score_threshold: 0.8
  
  ETHUSDT:
    base_currency: ETH
    quote_currency: USDT
    tick_size: 0.01
